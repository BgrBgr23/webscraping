<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Kitap fiyatlarını karşılaştırın — en uygun fiyatı bulun.">
    <title>{% block title %}KitapBul{% endblock %} | Fiyat Karşılaştırma</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>
    <div class="bg-particles" aria-hidden="true">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>

    <nav class="navbar" id="main-nav">
        <div class="nav-container">
            <a href="{{ url_for('index') }}" class="nav-logo">
                <span class="logo-icon">📚</span>
                <span class="logo-text">Kitap<span class="logo-accent">Bul</span></span>
            </a>
            <div class="nav-links">
                
                <div class="dropdown">
                    <button class="dropdown-toggle-btn">
                        <span class="nav-icon">📁</span> Kategoriler
                    </button>
                    <div class="dropdown-menu-content">
                        <a href="/category/Roman">Roman</a>
                        <a href="/category/Edebiyat">Edebiyat</a>
                        <a href="/category/Klasikler">Klasikler</a>
                        <a href="/category/Felsefe">Felsefe</a>
                        <a href="/category/Tarih">Tarih</a>
                        <a href="/category/Fantastik">Fantastik</a>
                        <a href="/category/Macera">Macera</a>
                    </div>
                </div>

                <a href="{{ url_for('index') }}" class="nav-link {% if request.endpoint == 'index' %}active{% endif %}">
                    <span class="nav-icon">🔍</span> Ara
                </a>
                <a href="{{ url_for('favorites') }}"
                    class="nav-link {% if request.endpoint == 'favorites' %}active{% endif %}">
                    <span class="nav-icon">❤️</span> Favoriler
                </a>
                <a href="{{ url_for('alerts') }}"
                    class="nav-link {% if request.endpoint == 'alerts' %}active{% endif %}">
                    <span class="nav-icon">🔔</span> Alarmlar
                </a>
                <a href="{{ url_for('history') }}"
                    class="nav-link {% if request.endpoint == 'history' %}active{% endif %}">
                    <span class="nav-icon">📋</span> Geçmiş
                </a>
            </div>
            <button class="nav-toggle" id="nav-toggle" aria-label="Menü">☰</button>
        </div>
    </nav>

    <div id="toast-container" class="toast-container"></div>

    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <div class="footer-container">
            <p>© 2026 KitapBul — Web Scraping Fiyat Karşılaştırma Aracı</p>
            <p class="footer-tech">Python • Flask • BeautifulSoup • Pandas • Matplotlib</p>
        </div>
    </footer>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>

</html>
